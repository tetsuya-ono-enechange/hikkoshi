<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お引越し先でもエネチェンジでんき｜継続特典5,000円分プレゼント</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff6600;
            --secondary-color: #004494;
            --accent-color: #ff3300;
            --bg-light: #f4f7f9;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            line-height: 1.6;
            background-color: var(--bg-light);
            word-break: break-all;
        }

        /* ヘッダーの最適化 */
        header {
            background: #fff;
            padding: 10px 5%;
            display: flex;
            justify-content: center; /* スマホでは中央寄せ */
            align-items: center;
            border-bottom: 3px solid var(--primary-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        /* メインビジュアルの最適化 */
        .mv-section {
            text-align: center;
            padding: 20px 15px;
            background-color: #fff;
        }

        .mv-container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
        }

        .mv-section img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: block; /* 下の隙間を消す */
        }

        /* メリットセクションの最適化（グリッドレイアウト） */
        .merit-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px 5%;
            max-width: 1100px;
            margin: 0 auto;
        }
